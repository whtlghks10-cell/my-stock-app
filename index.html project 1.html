<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Ultra Stock</title>
    <style>
        :root { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-sub: #8e8e93; --up-color: #ff453a; --down-color: #0a84ff; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .header { margin-top: 40px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin: 0; }
        #current-time { color: var(--text-sub); margin-top: 5px; font-size: 14px; }
        .stock-card { background-color: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .name { font-size: 18px; font-weight: 600; display: block; }
        .symbol { font-size: 12px; color: var(--text-sub); }
        .price { font-size: 18px; font-weight: 700; display: block; text-align: right; }
        .change { font-size: 14px; font-weight: 500; }
        .up { color: var(--up-color); }
        .down { color: var(--down-color); }
    </style>
</head>
<body>
    <div class="header">
        <h1>실시간 와치리스트</h1>
        <div id="current-time">연결 시도 중...</div>
    </div>
    <div id="stock-list">
        <div class="stock-card">
            <div><span class="name">서버 연결 중...</span><span class="symbol">잠시만 기다려주세요</span></div>
            <div style="text-align:right"><span class="price">불러오는 중</span></div>
        </div>
    </div>

    <script>
        const stocks = [
            { name: '삼성전자', symbol: '005930.KS', cur: '₩' },
            { name: '테슬라', symbol: 'TSLA', cur: '$' },
            { name: '엔비디아', symbol: 'NVDA', cur: '$' },
            { name: '비트코인', symbol: 'BTC-USD', cur: '$' }
        ];

        async function fetchStockData() {
            const list = document.getElementById('stock-list');
            try {
                const symbols = stocks.map(s => s.symbol).join(',');
                // 이번에는 'allorigins' 대신 'api.codetabs.com'이라는 다른 우회 서버를 써보겠습니다.
                const url = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}`)}`;
                
                const res = await fetch(url);
                const data = await res.json();
                const quotes = data.quoteResponse.result;

                if(!quotes) throw new Error('No data');

                list.innerHTML = '';
                quotes.forEach(q => {
                    const sInfo = stocks.find(s => s.symbol === q.symbol);
                    const isUp = q.regularMarketChangePercent >= 0;
                    list.innerHTML += `
                        <div class="stock-card">
                            <div><span class="name">${sInfo.name}</span><span class="symbol">${q.symbol}</span></div>
                            <div style="text-align:right">
                                <span class="price">${sInfo.cur}${q.regularMarketPrice.toLocaleString()}</span>
                                <span class="change ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'}${Math.abs(q.regularMarketChangePercent).toFixed(2)}%</span>
                            </div>
                        </div>`;
                });
                document.getElementById('current-time').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.log("재시도 중...");
                // 실패해도 기존 리스트는 유지하거나 안내 문구만 살짝 변경
                document.getElementById('current-time').innerText = "데이터 갱신 지연 (재시도 중...)";
            }
        }

        fetchStockData();
        setInterval(fetchStockData, 30000);
    </script>
</body>
</html>
